name: Deploy Worker to Cloudflare

# Auto-deploys the remote MCP connector whenever code that affects it lands on
# main. Doc-only changes (README, DEPLOY.md) are ignored so they don't trigger
# a needless redeploy. Can also be run manually from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'src/**'
      - 'wrangler.jsonc'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
