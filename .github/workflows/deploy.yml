name: Deploy Worker to Cloudflare

# Auto-deploys the remote MCP connector whenever code that affects it lands on
# main. Doc-only changes (README, DEPLOY.md) are ignored so they don't trigger
# a needless redeploy. Can also be run manually from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'src/**'
      - 'wrangler.jsonc'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Use the project's own wrangler (v4, from npm ci) so it matches local and
      # understands wrangler.jsonc. The Cloudflare wrangler-action pins an older
      # wrangler that predates wrangler.jsonc support.
      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
